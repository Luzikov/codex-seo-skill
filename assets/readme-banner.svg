<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Codex SEO banner</title>
  <desc id="desc">Banner for the Codex SEO repository</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1130" cy="110" r="150" fill="#f97316" opacity="0.08"/>
  <circle cx="1040" cy="540" r="220" fill="#22c55e" opacity="0.07"/>
  <rect x="70" y="486" width="420" height="6" rx="3" fill="url(#accent)"/>

  <text x="80" y="180" fill="#f8fafc" font-family="Consolas, Menlo, monospace" font-size="108" font-weight="700" letter-spacing="3">CODEX</text>
  <text x="80" y="292" fill="#f8fafc" font-family="Consolas, Menlo, monospace" font-size="108" font-weight="700" letter-spacing="3">SEO</text>
  <text x="82" y="362" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="600">SEO Skill for Codex</text>
  <text x="82" y="420" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="28">Full audits - Schema - AI search - Codebase review</text>

  <g transform="translate(745,125)">
    <rect x="0" y="0" width="440" height="380" rx="24" fill="#0f172a" opacity="0.88" stroke="#334155"/>
    <text x="34" y="62" fill="#f8fafc" font-family="Consolas, Menlo, monospace" font-size="34">Use $seo to audit</text>
    <text x="34" y="112" fill="#94a3b8" font-family="Consolas, Menlo, monospace" font-size="28">https://example.com</text>

    <rect x="34" y="152" width="370" height="1" fill="#334155"/>

    <text x="34" y="205" fill="#f97316" font-family="Consolas, Menlo, monospace" font-size="24">- technical SEO</text>
    <text x="34" y="248" fill="#22c55e" font-family="Consolas, Menlo, monospace" font-size="24">- Schema.org</text>
    <text x="34" y="291" fill="#38bdf8" font-family="Consolas, Menlo, monospace" font-size="24">- AI search readiness</text>
    <text x="34" y="334" fill="#e2e8f0" font-family="Consolas, Menlo, monospace" font-size="24">- Next.js code review</text>

    <circle cx="392" cy="56" r="9" fill="#22c55e" filter="url(#glow)"/>
  </g>
</svg>
